<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>송캐치 단체전</title><link rel="stylesheet" href="/music.css"></head>
<body><header class="music-header"><a href="/music" class="mini-brand">← 송캐치 단체전</a></header><main class="lobby-layout">
<section class="panel form-shell" style="margin:0;width:auto"><h1>방 만들기·참가</h1><div class="field"><label for="nickname">닉네임</label><input id="nickname" maxlength="30"></div><div class="field"><label for="title">방 제목</label><input id="title" maxlength="40" value="신나는 노래 퀴즈"></div><div class="field-row"><div class="field"><label for="maxPlayers">정원</label><input id="maxPlayers" type="number" min="2" max="30" value="10"></div><div class="field"><label for="totalRounds">문제 수</label><input id="totalRounds" type="number" min="1" max="50" value="10"></div></div><div class="field"><label for="setId">문제집</label><select id="setId"><option value="">전체 단체전 음원</option></select></div><div class="field"><label for="answerMode">정답</label><select id="answerMode"><option value="title">노래 제목</option><option value="artist">가수</option><option value="both">제목 + 가수</option></select></div><label class="check-row"><input id="isPublic" type="checkbox" checked> 공개 방</label><label class="check-row"><input id="allowLateJoin" type="checkbox"> 게임 중 입장 허용</label><button id="create" class="primary wide">새 방 만들기</button><div class="answer-row"><input id="code" maxlength="6" placeholder="6자리 방 코드"><button id="join" class="secondary">코드 입장</button></div><div id="notice" class="notice hidden"></div></section>
<section class="panel room-list"><div class="scorebar"><h2>공개 방</h2><button id="refresh" class="secondary">새로고침</button></div><div id="rooms"></div></section></main><script src="/socket.io/socket.io.js"></script><script src="/music-common.js"></script><script src="/music-lobby.js"></script></body></html>
