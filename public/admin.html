<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>송캐치 관리</title><link rel="stylesheet" href="/music.css"></head><body><main class="admin-layout">
<nav class="admin-nav"><h2>송캐치 관리</h2><button data-section="songs">음원</button><button data-section="sets">문제집</button><button data-section="rooms">진행 방</button><button data-section="logs">기록</button><button data-section="security">보안</button><button id="logout">로그아웃</button></nav>
<div class="admin-main"><div id="notice" class="notice hidden"></div>
<section id="songs" class="admin-section"><div class="scorebar"><h1>음원 관리</h1><button id="newSong" class="primary">+ 음원 등록</button></div><div class="toolbar"><input id="songSearch" placeholder="제목·가수 검색"><button id="searchSong" class="secondary">검색</button></div><div style="overflow:auto"><table class="data-table"><thead><tr><th>제목</th><th>가수</th><th>장르</th><th>상태</th><th>관리</th></tr></thead><tbody id="songRows"></tbody></table></div></section>
<section id="sets" class="admin-section hidden"><div class="scorebar"><h1>문제집</h1><button id="newSet" class="primary">+ 문제집 만들기</button></div><div id="setRows"></div></section>
<section id="rooms" class="admin-section hidden"><h1>진행 중인 방</h1><button id="refreshRooms" class="secondary">새로고침</button><div id="roomRows"></div></section>
<section id="logs" class="admin-section hidden"><h1>관리 기록</h1><button id="refreshLogs" class="secondary">새로고침</button><div style="overflow:auto"><table class="data-table"><thead><tr><th>시간</th><th>작업</th><th>대상</th></tr></thead><tbody id="logRows"></tbody></table></div></section>
<section id="security" class="admin-section hidden"><h1>비밀번호 변경</h1><form id="passwordForm" class="panel form-shell" style="margin:0"><div class="field"><label>현재 비밀번호</label><input id="currentPassword" type="password" required></div><div class="field"><label>새 비밀번호 (10자 이상)</label><input id="newPassword" type="password" minlength="10" required></div><button class="primary">변경</button></form></section></div></main>
<div id="songModal" class="modal hidden"><form id="songForm" class="panel modal-card"><div class="scorebar"><h2 id="songModalTitle">음원 등록</h2><button type="button" class="secondary closeModal">닫기</button></div><input id="songId" type="hidden"><div class="field-row"><div class="field"><label>제목</label><input name="title" required></div><div class="field"><label>가수</label><input name="artist" required></div></div><div class="field-row"><div class="field"><label>제목 별칭 (쉼표 구분)</label><input name="titleAliases"></div><div class="field"><label>가수 별칭</label><input name="artistAliases"></div></div><div class="field"><label>음원 파일</label><input name="audio" type="file" accept=".mp3,.m4a,.wav,.ogg,audio/*"><small>새 등록 시 필수 · 파일을 고르면 전체 길이를 자동으로 읽습니다.</small></div><div class="field"><label>대표 이미지 (선택)</label><input name="image" type="file" accept=".jpg,.jpeg,.png,.webp,image/*"></div><div class="field-row"><div class="field"><label>음원 전체 길이(초)</label><input name="duration" type="number" step="0.01" min="1" required></div><div class="field"><label>시작 위치(초)</label><input name="startTime" type="number" step="0.01" min="0" value="0" required></div></div><div class="field-row"><div class="field"><label>1단계(초)</label><input name="firstDuration" type="number" step="0.1" value="3" required></div><div class="field"><label>2단계(초)</label><input name="secondDuration" type="number" step="0.1" value="5" required></div><div class="field"><label>3단계(초)</label><input name="thirdDuration" type="number" step="0.1" value="10" required></div></div><div class="field-row"><div class="field"><label>장르</label><input name="genre"></div><div class="field"><label>난이도</label><select name="difficulty"><option>쉬움</option><option selected>보통</option><option>어려움</option></select></div></div><div class="field-row"><div class="field"><label>발매 연도</label><input name="releaseYear" type="number"></div><div class="field"><label>태그 (쉼표 구분)</label><input name="tags"></div></div><div class="field"><label>설명</label><textarea name="description"></textarea></div><label class="check-row"><input name="isActive" type="checkbox" checked> 활성화</label><label class="check-row"><input name="useInSolo" type="checkbox" checked> 개인전 사용</label><label class="check-row"><input name="useInGroup" type="checkbox" checked> 단체전 사용</label><label id="copyrightRow" class="check-row copyright-check"><input name="copyrightConfirmed" type="checkbox"> 이 음원을 업로드하고 서비스할 권한을 확인했습니다.</label><button class="primary wide">저장</button></form></div>
<div id="setModal" class="modal hidden"><form id="setForm" class="panel modal-card"><div class="scorebar"><h2>문제집 만들기</h2><button type="button" class="secondary closeSetModal">닫기</button></div><div class="field"><label>이름</label><input id="setName" required></div><div class="field"><label>설명</label><textarea id="setDescription"></textarea></div><label class="check-row"><input id="setSolo" type="checkbox" checked> 개인전</label><label class="check-row"><input id="setGroup" type="checkbox" checked> 단체전</label><label class="check-row"><input id="setPublic" type="checkbox" checked> 사용자에게 공개</label><div class="field"><label>포함할 음원</label><select id="setSongs" multiple size="10"></select></div><button class="primary wide">저장</button></form></div>
<script src="/music-common.js"></script><script src="/admin.js"></script></body></html>
