<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>송캐치 방</title><link rel="stylesheet" href="/music.css"></head>
<body><main class="room-shell"><header class="room-top"><div><b id="roomTitle">송캐치</b> <small>CODE <strong id="roomCode"></strong></small></div><div><button id="ready" class="secondary">준비</button> <button id="start" class="primary hidden">게임 시작</button> <button id="leave" class="danger">나가기</button></div></header>
<section class="room-grid"><div class="panel quiz-panel"><p id="status" class="eyebrow">친구들을 기다리는 중</p><div id="disc" class="audio-disc">♫</div><h1 id="quizTitle">방장이 게임을 시작하면 음악이 나와요</h1><p id="stage" class="lead"></p><audio id="audio" preload="auto"></audio><div id="answerArea" class="answer-row hidden"><input id="answer" placeholder="정답 입력"><input id="artist" class="hidden" placeholder="가수 입력"><button id="answerButton" class="primary">정답!</button></div><div id="result" class="notice hidden"></div></div>
<aside class="panel side-panel"><div><h3>참가자</h3><div id="players" class="players"></div></div><div id="chat" class="chat"></div><div class="answer-row"><input id="chatInput" maxlength="200" placeholder="채팅 메시지"><button id="chatSend" class="secondary">전송</button></div></aside></section></main><script src="/socket.io/socket.io.js"></script><script src="/music-common.js"></script><script src="/music-room.js"></script></body></html>
