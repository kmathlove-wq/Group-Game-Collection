<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>송캐치 개인전</title><link rel="stylesheet" href="/music.css"></head>
<body><header class="music-header"><a href="/music" class="mini-brand">← 송캐치</a></header><main class="solo-layout">
<section id="setup" class="panel form-shell"><h1>개인전 설정</h1><div class="field-row"><div class="field"><label for="answerMode">맞힐 항목</label><select id="answerMode"><option value="title">노래 제목</option><option value="artist">가수</option><option value="both">제목 + 가수</option></select></div><div class="field"><label for="inputType">답안 방식</label><select id="inputType"><option value="text">주관식</option><option value="choice">4지선다</option></select></div></div>
<div class="field-row"><div class="field"><label for="count">문제 수</label><input id="count" type="number" min="1" max="50" value="10"></div><div class="field"><label for="setId">문제집</label><select id="setId"><option value="">전체 음원</option></select></div></div>
<div class="field-row"><div class="field"><label for="genre">장르</label><select id="genre"><option value="">전체</option></select></div><div class="field"><label for="difficulty">난이도</label><select id="difficulty"><option value="">전체</option></select></div></div><div id="setupNotice" class="notice hidden"></div><button id="start" class="primary wide">게임 시작</button></section>
<section id="game" class="panel solo-game hidden"><div class="scorebar"><span id="round">1 / 10</span><span id="score">0점</span></div><div class="stage-dots"><i></i><i></i><i></i></div><div id="disc" class="audio-disc">♫</div><h2 id="prompt">노래 제목은?</h2><audio id="audio" preload="auto"></audio><div id="textAnswer" class="answer-row"><input id="answer" autocomplete="off" placeholder="정답 입력"><input id="artistAnswer" class="hidden" autocomplete="off" placeholder="가수 입력"><button id="submit" class="primary">정답!</button></div><div id="choices" class="choices hidden"></div><div id="result" class="notice hidden"></div><div class="toolbar" style="justify-content:center"><button id="replay" class="secondary">다시 듣기</button><button id="skip" class="secondary">모르겠어요</button><button id="next" class="primary hidden">다음 문제</button></div></section>
</main><script src="/music-common.js"></script><script src="/music-solo.js"></script></body></html>
